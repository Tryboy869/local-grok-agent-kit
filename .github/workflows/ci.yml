name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - run: pip install -e .
    - run: python -c "from grok_local_agent_kit import Agent; a=Agent(); print(a.run('test'))"